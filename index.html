  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #111;
      --card-bg: #1c1c1c;
      --text: #e8e4dc;
      --muted: #888;
      --accent: #c9a96e;
      --border: #2a2a2a;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Georgia', serif;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      padding: 4rem 2rem 3rem;
      text-align: center;
      border-bottom: 1px solid var(--border);
      max-width: 860px;
      margin: 0 auto;
    }

    header .eyebrow {
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1rem;
      font-family: 'Helvetica Neue', sans-serif;
    }

    header h1 {
      font-size: clamp(2.2rem, 5vw, 3.8rem);
      font-weight: 400;
      line-height: 1.1;
      letter-spacing: -0.02em;
      margin-bottom: 1.2rem;
    }

    header p {
      font-size: 1.05rem;
      color: var(--muted);
      max-width: 480px;
      margin: 0 auto;
      line-height: 1.7;
      font-style: italic;
    }

    header p a {
      color: var(--accent);
      text-decoration: none;
    }
    header p a:hover { text-decoration: underline; }

    .count {
      margin-top: 1rem;
      font-size: 0.8rem;
      color: var(--muted);
      font-family: 'Helvetica Neue', sans-serif;
      font-style: normal;
      letter-spacing: 0.05em;
    }

    /* ── Gallery ── */
    .gallery {
      padding: 3rem 1.5rem 5rem;
      max-width: 1400px;
      margin: 0 auto;
      columns: 1;
      column-gap: 1.25rem;
    }

    @media (min-width: 600px)  { .gallery { columns: 2; } }
    @media (min-width: 900px)  { .gallery { columns: 3; } }
    @media (min-width: 1200px) { .gallery { columns: 4; } }

    /* ── Card ── */
    .card {
      break-inside: avoid;
      margin-bottom: 1.25rem;
      background: var(--card-bg);
      border-radius: 4px;
      overflow: hidden;
      position: relative;
      display: block;
      text-decoration: none;
      color: inherit;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.6);
    }

    .card img {
      width: 100%;
      display: block;
      background: #222;
    }

    .card-caption {
      padding: 1rem 1.1rem 1.2rem;
      border-top: 1px solid var(--border);
    }

    .card-issue {
      font-size: 0.68rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      font-family: 'Helvetica Neue', sans-serif;
      margin-bottom: 0.4rem;
    }

    .card-title {
      font-size: 0.95rem;
      line-height: 1.4;
      font-style: italic;
      margin-bottom: 0.25rem;
    }

    .card-artist {
      font-size: 0.8rem;
      color: var(--muted);
      font-family: 'Helvetica Neue', sans-serif;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 2.5rem 1rem;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.8rem;
      font-family: 'Helvetica Neue', sans-serif;
      letter-spacing: 0.03em;
    }

    footer a {
      color: var(--accent);
      text-decoration: none;
    }
    footer a:hover { text-decoration: underline; }

    /* ── Lightbox ── */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.93);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
      padding: 2rem;
    }
    .lightbox.open { display: flex; }

    .lightbox-inner {
      position: relative;
      max-width: 90vw;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.2rem;
      cursor: default;
    }

    .lightbox-inner img {
      max-width: 100%;
      max-height: 75vh;
      object-fit: contain;
      border-radius: 2px;
      box-shadow: 0 20px 80px rgba(0,0,0,0.8);
    }

    .lightbox-info {
      text-align: center;
    }

    .lightbox-info .lb-title {
      font-size: 1.1rem;
      font-style: italic;
      margin-bottom: 0.3rem;
    }

    .lightbox-info .lb-artist {
      font-size: 0.85rem;
      color: var(--muted);
      font-family: 'Helvetica Neue', sans-serif;
      margin-bottom: 0.6rem;
    }

    .lightbox-info .lb-link {
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      text-decoration: none;
      font-family: 'Helvetica Neue', sans-serif;
      border: 1px solid var(--accent);
      padding: 0.35rem 0.8rem;
      border-radius: 2px;
      display: inline-block;
      transition: background 0.2s, color 0.2s;
    }
    .lightbox-info .lb-link:hover {
      background: var(--accent);
      color: #111;
    }

    .lightbox-close {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.8rem;
      cursor: pointer;
      line-height: 1;
      z-index: 1001;
    }
    .lightbox-close:hover { color: var(--text); }

  </style>
</head>

// CSS columns fills top-to-bottom per column, so we pre-shuffle items
// so that reading left-to-right across visual rows stays roughly chronological.
function reorderForColumns(items, cols) {
  if (cols <= 1) return items;
  const out = [];
  const rows = Math.ceil(items.length / cols);
  for (let col = 0; col < cols; col++) {
    for (let row = 0; row < rows; row++) {
      const idx = row * cols + col;
      if (idx < items.length) out.push(items[idx]);
    }
  }
  return out;
}

function getColCount() {
  const w = window.innerWidth;
  if (w >= 1200) return 4;
  if (w >= 900)  return 3;
  if (w >= 600)  return 2;
  return 1;
}

function makeCard(art) {
  const card = document.createElement('a');
  card.className = 'card';
  card.href = '#';
  card.setAttribute('role', 'button');
  card.setAttribute('aria-label', art.title + ' by ' + art.artist);
  card.innerHTML = `
    <img src="${art.img}" alt="${art.title} — ${art.artist}" loading="lazy" />
    <div class="card-caption">
      <div class="card-issue">${art.issue}</div>
      <div class="card-title">${art.title}</div>
      <div class="card-artist">${art.artist}</div>
    </div>
  `;
  card.addEventListener('click', (e) => { e.preventDefault(); openLightbox(art); });
  return card;
}

const gallery = document.getElementById('gallery');

function renderGallery() {
  const cols = getColCount();
  const ordered = reorderForColumns(artworks, cols);
  gallery.innerHTML = '';
  ordered.forEach(art => gallery.appendChild(makeCard(art)));
}

renderGallery();

let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(renderGallery, 150);
});

// Lightbox
const lightbox = document.getElementById('lightbox');
const lbImg    = document.getElementById('lb-img');
const lbTitle  = document.getElementById('lb-title');
const lbArtist = document.getElementById('lb-artist');
const lbLink   = document.getElementById('lb-link');

function openLightbox(art) {
  lbImg.src    = art.img;
  lbImg.alt    = art.title;
  lbTitle.textContent  = art.title;
  lbArtist.textContent = art.artist + '  ·  ' + art.issue;
  lbLink.href  = art.url;
  lightbox.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  lightbox.classList.remove('open');
  document.body.style.overflow = '';
  lbImg.src = '';
}

document.getElementById('lb-close').addEventListener('click', closeLightbox);
lightbox.addEventListener('click', closeLightbox);
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeLightbox(); });
</script>
